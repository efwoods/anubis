services:
  postgres:
    # LangGraph store search requires pgvector; vanilla postgres:16 has no $libdir/vector
    # Must match cluster major version (your DB reports 16.x). pg17 image + PG16 data is invalid.
    image: pgvector/pgvector:pg16
    container_name: postgres16
    restart: unless-stopped
    # Optional dev logging: statements go to stderr → `docker compose -f docker-compose-postgres.yml logs -f postgres`.
    # Debugg Logs: Postgres only logs checkpoints/recovery unless configured. Comment out `command` for quiet/prod-like runs.
    command:
      - postgres
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_statement=mod
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# Named volume `anubis_langgraph-data` is created automatically on first `up`.
# (Previously `external: true` required a pre-created volume and broke after volume removal.)
volumes:
  postgres_data:
    name: anubis_langgraph-data