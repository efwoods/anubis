volumes:
    langgraph-data:
        driver: local
    grafana-storage:
        driver: local
    redis-data:
        driver: local

services:
    redis:
        image: redis:7-alpine
        ports:
            - "${REDIS_PORT:-6379}:${REDIS_PORT:-6379}"
        command: redis-server --appendonly yes
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5
        restart: unless-stopped

    langgraph-api-dev:
        image: evdev3/anubis-langgraph-api:latest
        pull_policy: never
        dns:
            - 168.83.129.16
            - 8.8.8.8
        ports:
            - "${PORT:-8123}:${PORT:-8123}"
            - "${DEBUG_PORT:-5678}:${DEBUG_PORT:-5678}"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        healthcheck:
            test: python /api/healthcheck.py
            interval: 60s
            start_interval: 1s
            start_period: 10s
        env_file:
            - .env.dev
        depends_on:
            redis:
                condition: service_healthy
        volumes:
            - .:/deps/anubis
            # Prefetched Hub weights (see ``ensure_huggingface_models_cached``); survives container restarts.
            - ~/.cache/huggingface:/root/.cache/huggingface
