volumes:
    langgraph-data:
        driver: local
        
services:
    nginx:
      image: nginx:latest
      ports:
        - "443:443"  # Only Nginx is exposed to the VM/Load Balancer
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf
        - ./certificate:/etc/ssl/private/
      restart: always
      networks:
        - api-network
      depends_on:
        - langgraph-api
    langgraph-api:
        image: evdev3/anubis-langgraph-api:latest
        pull_policy: never
        dns:
            - 168.83.129.16
            - 8.8.8.8
        ports:
            - "8123:8000"
            - "5678:5678"
        healthcheck:
            test: python /api/healthcheck.py
            interval: 60s
            start_interval: 1s
            start_period: 10s
        env_file:
            - .env
        volumes:
            - .:/deps/anubis
            - ~/.cache/huggingface:/root/.cache/huggingface
        networks:
            - api-network

networks:
    api-network:
        driver: bridge