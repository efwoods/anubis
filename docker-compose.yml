volumes:
    langgraph-data:
        driver: local
services:
    langgraph-api:
        image: evdev3/anubis-langgraph-api:latest
        ports:
            - "8123:8000"
        command: uvicorn webapp:app --host 0.0.0.0 --port 8000
        healthcheck:
            test: python /api/healthcheck.py
            interval: 60s
            start_interval: 1s
            start_period: 10s
        env_file:
            - .env
