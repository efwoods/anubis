events {
    worker_connections 1024;
}

http { 

    server {
        listen 443 ssl;
        server_name api.neuralnexus.site;

        ssl_certificate /etc/ssl/private/origin_cert.pem;
        ssl_certificate_key /etc/ssl/private/cloudflare_private.key;

        location / {
            proxy_pass http://langgraph-api:8000; # Assuming FastAPI runs on port 8000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}   